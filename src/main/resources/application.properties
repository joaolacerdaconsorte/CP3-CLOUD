# ========================================
# VaultBank API — Configuração Principal
# ========================================
spring.application.name=VaultBank API

# Porta do servidor
server.port=${PORT:8080}

# ========================================
# Perfil ativo (default = H2 em memória)
# Use SPRING_PROFILES_ACTIVE=docker para MySQL
# ========================================
spring.profiles.active=${SPRING_PROFILES_ACTIVE:default}

# ========================================
# H2 Database (perfil default — demo/cloud)
# ========================================
spring.datasource.url=jdbc:h2:mem:vaultbank
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# ========================================
# JPA / Hibernate
# ========================================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false

# ========================================
# Swagger / OpenAPI
# ========================================
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.operationsSorter=method

# ========================================
# Actuator
# ========================================
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=always
